<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Unimart - Product Details</title>

    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      .product-container {
        display: flex;
        gap: 40px;
        padding: 20px;
      }

      .product-images {
        flex: 1;
      }

      .product-info-box {
        flex: 1;
      }

      .main-image img {
        width: 100%;
        border-radius: 10px;
      }

      .thumbs {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
      }

      .thumbs img {
        width: 60px;
        cursor: pointer;
        border: 2px solid transparent;
      }

      .thumbs img.active {
        border: 2px solid #000;
      }

      .qty-box {
        display: flex;
        gap: 10px;
        margin: 15px 0;
      }

      .qty-box button {
        width: 35px;
        height: 35px;
      }

      .action-buttons {
        display: flex;
        gap: 10px;
        margin: 15px 0;
      }

      .btn-cart {
        background: orange;
        border: none;
        padding: 10px;
        cursor: pointer;
      }

      .btn-buy {
        background: #ff5722;
        color: #fff;
        border: none;
        padding: 10px;
      }

      .product-action-bar {
        position: fixed;
        bottom: 0;
        width: 100%;
        display: flex;
      }

      .product-action-bar button {
        flex: 1;
        padding: 15px;
      }
    </style>
  </head>

  <body>
    <!-- ================= HEADER ================= -->
    <header class="site-header">
      <a href="index.html" class="back-btn">⬅ Back to Shop</a>
    </header>

    <!-- ================= MAIN ================= -->
    <main class="product-detail-page">
      <section class="product-container">
        <!-- ===== LEFT: IMAGES ===== -->
        <div class="product-images">
          <div class="thumbs" id="thumbs"></div>

          <div class="main-image">
            <img id="productImg" src="" alt="Product" />
            <span class="share-btn" id="shareBtn">
              <i class="fa-solid fa-share-nodes"></i>
            </span>
          </div>
        </div>

        <!-- ===== RIGHT: DETAILS ===== -->
        <div class="product-info-box">
          <h1 id="productName"></h1>

          <!-- PRICE -->
          <div class="price-row">
            <span class="price" id="productPrice"></span>
            <span class="old-price" id="oldPrice"></span>
            <span class="discount" id="discount"></span>
          </div>

          <!-- STOCK -->
          <p id="productStock"></p>
          <p id="productSKU"></p>

          <!-- TAGS -->
          <ul id="productTags" class="tags"></ul>

          <!-- DESCRIPTION -->
          <p id="productDesc" class="desc"></p>

          <!-- FEATURES -->
          <ul class="features">
            <li><i class="fa fa-truck"></i> Free Delivery</li>
            <li><i class="fa fa-money-bill"></i> Cash on Delivery</li>
            <li><i class="fa fa-check"></i> 7 Days Replacement</li>
          </ul>

          <!-- ⭐ RATING -->
          <div id="productRating"></div>

          <!-- 📝 REVIEWS -->
          <div id="productReviews"></div>

          <!-- 🔢 QUANTITY -->
          <div class="qty-box">
            <button id="qtyMinus">−</button>
            <input type="number" id="qtyInput" value="1" min="1" />
            <button id="qtyPlus">+</button>
          </div>

          <!-- 🛒 ACTION BUTTONS -->
          <!-- ACTION BUTTONS -->
          <div class="action-buttons">
            <button id="btnCart" class="btn-cart">Add to Cart</button>
            <a id="whatsappBtn" class="btn-whatsapp" target="_blank">
              <i class="fa-brands fa-whatsapp"></i> Order Now
            </a>
          </div>
        </div>
      </section>

      <!-- ================= RELATED ================= -->
      <section class="related-section">
        <h2>You may also like</h2>
        <div class="related-grid" id="relatedProducts"></div>
      </section>
    </main>

    <!-- ================= STICKY MOBILE BAR ================= -->
    <div class="product-action-bar">
      <button class="btn-cart" id="btnCartMobile">Add to Cart</button>
      <button class="btn-buy" id="btnBuyMobile">Buy Now</button>
    </div>

    <!-- ================= JS ================= -->
    <script src="./js/product.js"></script>
  </body>
</html>
